name: Radio App Daily Beta

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect_updates:
    name: Detect repository updates
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.changes.outputs.has_updates }}
      change_count: ${{ steps.changes.outputs.change_count }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: meta
        run: |
          short_sha="$(git rev-parse --short=8 HEAD)"
          release_tag="beta-${{ github.run_number }}-${short_sha}"

          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Check for repository updates in last 24h
        id: changes
        run: |
          change_count="$(git rev-list --count --since='24 hours ago' HEAD)"

          if [ "${change_count}" -gt 0 ]; then
            has_updates=true
          else
            has_updates=false
          fi

          echo "change_count=${change_count}" >> "${GITHUB_OUTPUT}"
          echo "has_updates=${has_updates}" >> "${GITHUB_OUTPUT}"

          {
            echo "### Daily update check"
            echo "- Event: ${{ github.event_name }}"
            echo "- Commits in last 24 hours: ${change_count}"
            echo "- Updates detected: ${has_updates}"
          } >> "${GITHUB_STEP_SUMMARY}"

  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    needs: detect_updates
    if: needs.detect_updates.outputs.has_updates == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK tools
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Run tests
        run: ./gradlew --no-daemon test

  build_and_release:
    name: Build and publish beta
    runs-on: ubuntu-latest
    needs:
      - detect_updates
      - test
    if: needs.detect_updates.outputs.has_updates == 'true' && needs.test.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK tools
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Set artifact name
        id: artifact_meta
        run: |
          artifact_name="midoriai-radio-debug-${{ github.run_number }}-${{ needs.detect_updates.outputs.short_sha }}"
          echo "artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_meta.outputs.artifact_name }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Publish beta prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect_updates.outputs.release_tag }}
          name: Beta ${{ github.run_number }} (${{ needs.detect_updates.outputs.short_sha }})
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: app/build/outputs/apk/debug/*.apk
          fail_on_unmatched_files: true
